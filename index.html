<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico?v=999">
<meta charset="UTF-8">
<title>Razoshi OS</title>

<style>
/* GENERAL */
body {
  background: #000;
  color: #fff;
  font-family: monospace;
  margin: 0;
  text-align: center;
  overflow-x: hidden;
}

/* LOGIN */
#login {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  transition: opacity 0.5s ease;
}

#login.hide {
  opacity: 0;
  pointer-events: none;
}

#login button {
  padding: 15px 30px;
  background: black;
  border: 2px solid #00ff88;
  color: #00ff88;
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
}

#login button:hover {
  background: #00ff88;
  color: black;
  box-shadow: 0 0 20px #00ff88;
}

/* GRID BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(0,255,0,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,0,0.12) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -2;
}

/* AVATAR & HEADER */
.avatar {
  margin-top: 70px;
  border-radius: 50%;
  border: 3px solid #00ff88;
  box-shadow: 0 0 15px #00ff88;
  width: 120px;
}

h1 {
  font-size: 60px;
  color: #00ff88;
  text-shadow: 0 0 15px #00ff88;
  margin-top: 90px;
}

.cursor {
  animation: blink 1s infinite;
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0;}
  100% {opacity:1;}
}

.bio {
  color: #aaa;
  margin-top: 10px;
}

/* LINKS */
.links {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
}

.button {
  width: 260px;
  padding: 15px;
  border: 2px solid #00ff88;
  color: #00ff88;
  text-decoration: none;
  background: #050505;
  transition: 0.2s;
}

.button:hover {
  background: #00ff88;
  color: black;
  box-shadow: 0 0 20px #00ff88;
}

/* TERMINAL */
.terminal {
  width: 80%;
  max-width: 700px;
  margin: 60px auto;
  border: 1px solid #00ff88;
  padding: 20px;
  background: #050505;
  text-align: left;
  box-shadow: 0 0 15px #00ff88;
  overflow-y: auto;
  max-height: 400px;
  word-wrap: break-word;
}

.terminal span {
  color: #00ff88;
}

/* VISITOR / CPU PANEL */
#visitorPanel {
  width: 80%;
  max-width: 700px;
  margin: 20px auto;
  padding: 10px;
  border: 1px solid #00ff88;
  background: #050505;
  color: #00ff88;
  text-align: center;
  font-family: monospace;
}

/* MUSIC PLAYER */
.player {
  margin: 40px auto;
  width: 300px;
  border: 1px solid #00ff88;
  padding: 15px;
  background: #050505;
}

.player button {
  margin: 5px;
  padding: 8px 12px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
  cursor: pointer;
}

.player button:hover {
  background: #00ff88;
  color: black;
}

/* GITHUB REPOS */
.repos {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 20px;
  padding: 40px;
}

.repo {
  border: 1px solid #00ff88;
  padding: 20px;
  background: #050505;
}

.repo:hover {
  box-shadow: 0 0 20px #00ff88;
}

footer {
  margin-top: 60px;
  color: #00ff88;
}

/* MATRIX */
canvas#matrix {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MOUSE GLOW */
#mouseGlow {
  position: fixed;
  top: 0;
  left: 0;
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, rgba(0,255,136,0.8) 0%, rgba(0,255,136,0) 70%);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 9999;
}
.window {
  position: absolute;
  top: 150px;
  left: 150px;
  width: 300px;
  background: #050505;
  border: 2px solid #00ff88;
  box-shadow: 0 0 15px #00ff88;
  display: none;
}

.titlebar {
  background: #00ff88;
  color: black;
  padding: 5px;
  cursor: move;
  display: flex;
  justify-content: space-between;
}

.content {
  padding: 10px;
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <h1>Welcome to Razoshi OS</h1>
  <button onclick="startOS()">Enter</button>
</div>

<!-- AVATAR AND HEADER -->
<img class="avatar" src="https://cdn.discordapp.com/avatars/1106891304849391656/2e3698c0ab7c452f5e4c40121705f12a.webp?size=128" alt="Razoshi Avatar">
<h1>razoshi<span class="cursor">_</span></h1>
<p class="bio">developer / scripts / network</p>

<!-- LINKS -->
<div class="links">
  <a class="button" href="https://discord.gg/eqfSepRC" target="_blank">Razoshi's Brotherhood Discord Server</a>
  <a class="button" href="https://github.com/onlyrazoshi" target="_blank">Razoshi's Github</a>
  <a class="button" href="https://guns.lol/onlyrazoshi" target="_blank">Razoshi's gunz.lol</a>
</div>

<!-- TERMINAL -->
<div class="terminal" id="terminalLog"></div>

<!-- VISITOR + CPU PANEL -->
<div id="visitorPanel">
  CPU Usage: <span id="cpuUsage">0%</span> | Guest: <span id="visitorInfo">loading...</span>
</div>

<!-- MUSIC PLAYER -->
<div class="player">
  <p id="trackName" style="color:#00ff88; margin-bottom:10px;"></p>
  <div style="display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:10px;">
    <button onclick="prevSong()">◀</button>
    <button id="playBtn">▶</button>
    <button onclick="nextSong()">▶▶</button>
  </div>
  <div style="margin:0 auto; background:#050505; border:1px solid #00ff88; height:8px; width:100%; max-width:300px; position:relative;">
    <div id="progress" style="background:#00ff88; height:100%; width:0%;"></div>
  </div>
</div>

<audio id="audio"></audio>

<!-- REPO SECTION -->
<h2 style="color:#00ff88">github repos</h2>
<div class="repos" id="repos"></div>

<footer>
  <p>site coded by pagoni hax & Razoshi</p>
  <p>Music by Death.Syndicate</p>
</footer>

<!-- MATRIX CANVAS -->
<canvas id="matrix"></canvas>

<!-- MOUSE GLOW -->
<div id="mouseGlow"></div>

<script>
/* LOGIN */
function startOS(){
  const login = document.getElementById("login");
  login.classList.add("hide");
  setTimeout(()=>{ login.style.display="none"; }, 500);
}

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const letters = "01";
const fontSize = 16;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);

function drawMatrix(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

function animateMatrix() {
  drawMatrix();
  drawParticles();
  updateParticles();
  requestAnimationFrame(animateMatrix);
}
animateMatrix();

/* MUSIC PLAYER */
const playlist = [
    { name: '9 Lives', url: 'https://files.catbox.moe/mer3g9.mp3' },
    { name: 'Fuck The World', url: 'https://files.catbox.moe/w0f1xs.mp3' },
    { name: 'Fuckboy Problem', url: 'https://files.catbox.moe/wywuwb.mp3' },
    { name: 'Gives You Hell', url: 'https://files.catbox.moe/pps1oj.mp3' },
    { name: 'Graveyard Shift', url: 'https://files.catbox.moe/4ls7sg.mp3'},
    { name: 'Heartbeat Flatline', url: 'https://files.catbox.moe/h8trjw.mp3'},
    { name: 'Im The King', url: 'https://files.catbox.moe/5z2sqn.mp3'},
    { name: 'Jack and Sally (Remix)', url: 'https://files.catbox.moe/l63mb4.mp3'},
    { name: 'Moya Lyubov - моя любовь', url: 'https://files.catbox.moe/4r4azv.mp3'},
    { name: 'Schizo', url: 'https://files.catbox.moe/3tbkl9.mp3'},
];

let current = 0;
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const trackName = document.getElementById("trackName");
const progress = document.getElementById("progress");

audio.src = playlist[current].url;
trackName.innerText = playlist[current].name;

playBtn.addEventListener("click", () => {
  if(audio.paused) audio.play();
  else audio.pause();
});

audio.addEventListener("play", () => { playBtn.innerText = "⏸"; });
audio.addEventListener("pause", () => { playBtn.innerText = "▶"; });

audio.addEventListener("timeupdate", () => {
  let pct = (audio.currentTime / audio.duration) * 100;
  progress.style.width = pct + "%";
});

audio.addEventListener("ended", nextSong);

function nextSong() {
  current = (current + 1) % playlist.length;
  audio.src = playlist[current].url;
  audio.play().catch(()=>{});
  trackName.innerText = playlist[current].name;
}

function prevSong() {
  current = (current - 1 + playlist.length) % playlist.length;
  audio.src = playlist[current].url;
  audio.play().catch(()=>{});
  trackName.innerText = playlist[current].name;
}

document.body.addEventListener("click", () => { audio.play().catch(()=>{}); }, { once: true });

/* TERMINAL / GITHUB REPOS */
const terminal = document.getElementById("terminalLog");
const repoContainer = document.getElementById("repos");

function logTerminal(cmd, result){
  const cmdP = document.createElement("p");
  cmdP.innerHTML = `<span>$</span> ${cmd}`;
  terminal.appendChild(cmdP);
  if(result){
    const resP = document.createElement("p");
    resP.textContent = result;
    terminal.appendChild(resP);
  }
  terminal.scrollTop = terminal.scrollHeight;
}

// Fetch GitHub repos
fetch("https://api.github.com/users/onlyrazoshi/repos")
.then(res => res.json())
.then(data => {
  logTerminal("whoami", "onlyrazoshi");
  logTerminal("status", "online");
  logTerminal("repositories:");

  data.slice(0,6).forEach(repo => {
    logTerminal(repo.name, repo.description || "no description");

    const div = document.createElement("div");
    div.className = "repo";
    div.innerHTML = `
        <h3>${repo.name}</h3>
        <p>${repo.description || "no description"}</p>
        <a href="${repo.html_url}" target="_blank" style="color:#00ff88">view repo</a>
    `;
    repoContainer.appendChild(div);
  });
})
.catch(err => logTerminal("error", "Could not fetch repos"));

/* VISITOR PANEL & CPU */
const cpuSpan = document.getElementById("cpuUsage");
const visitorInfoSpan = document.getElementById("visitorInfo");

// Fake CPU usage
setInterval(()=>{
  cpuSpan.innerText = Math.floor(Math.random()*100) + "%";
}, 1000);

// Visitor info
fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data=>{
  visitorInfoSpan.innerText = `${data.ip} — ${data.city}, ${data.country_name}`;
})
.catch(err=>{
  visitorInfoSpan.innerText = "Visitor info unavailable";
});

/* SMOOTH MOUSE GLOW */
const glow = document.getElementById("mouseGlow");
let mouseX=0, mouseY=0, glowX=0, glowY=0;

document.addEventListener("mousemove", e=>{
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animateGlow(){
  glowX += (mouseX - glowX) * 0.2;
  glowY += (mouseY - glowY) * 0.2;
  glow.style.transform = `translate(${glowX}px, ${glowY}px) translate(-50%, -50%)`;
  requestAnimationFrame(animateGlow);
}
animateGlow();
document.addEventListener("DOMContentLoaded", () => {

  const win = document.getElementById("myWindow");
  const btn = document.getElementById("openBtn");

  btn.addEventListener("click", () => {
    win.style.display = "block";
  });

  // CLOSE
  window.closeWindow = function() {
    win.style.display = "none";
  };

  // DRAG
  let isDragging = false;
  let offsetX, offsetY;

  const titlebar = win.querySelector(".titlebar");

  titlebar.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
  });

  document.addEventListener("mousemove", (e) => {
    if (isDragging) {
      win.style.left = (e.clientX - offsetX) + "px";
      win.style.top = (e.clientY - offsetY) + "px";
    }
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
  });

});
const fakeLines = [
  "Initializing system...",
  "Bypassing firewall...",
  "Access granted.",
  "Loading Razoshi OS modules...",
  "Connected to dark network.",
  "Welcome, user."
];

let lineIndex = 0;

function typeEffect() {
  if (lineIndex >= fakeLines.length) return;

  let text = fakeLines[lineIndex];
  let i = 0;

  let interval = setInterval(() => {
    if (i < text.length) {
      terminal.innerHTML += text.charAt(i);
      i++;
    } else {
      terminal.innerHTML += "<br>";
      clearInterval(interval);
      lineIndex++;
      setTimeout(typeEffect, 500);
    }
  }, 30);
}

typeEffect();

</script>

  <div class="window" id="myWindow">
  <div class="titlebar">
    <span>My App</span>
    <button onclick="closeWindow()">X</button>
  </div>
  <div class="content">
    Hello from Razoshi OS 👾
  </div>
</div>

<button id="openBtn" style="margin-top:20px;">
  Open Window
</button>
</body>
</html>

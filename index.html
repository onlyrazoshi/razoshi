<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Style Site</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      scroll-behavior: smooth;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      color: white;
      z-index: 1000;
    }

    header h1 {
      font-size: 20px;
      letter-spacing: 2px;
    }

    header nav a {
      margin: 0 10px;
      text-decoration: none;
      color: white;
      font-size: 14px;
    }

    section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1617788138017-80ad40651399') center/cover no-repeat;
    }

    .model3 {
      background: url('https://images.unsplash.com/photo-1583121274602-3e2820c69888') center/cover no-repeat;
    }

    .modelx {
      background: url('https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2') center/cover no-repeat;
    }

    h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-dark {
      background: black;
      color: white;
    }

    .btn-light {
      background: white;
      color: black;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <h1>TESLA</h1>
  <nav>
    <a href="#">Model S</a>
    <a href="#">Model 3</a>
    <a href="#">Model X</a>
  </nav>
</header>

<section class="hero">
  <h2>Model S</h2>
  <p>Order Online for Touchless Delivery</p>
  <div class="buttons">
    <button class="btn btn-dark">Custom Order</button>
    <button class="btn btn-light">Learn More</button>
  </div>
</section>

<section class="model3">
  <h2>Model 3</h2>
  <p>Affordable Electric Car</p>
  <div class="buttons">
    <button class="btn btn-dark">Order Now</button>
    <button class="btn btn-light">Details</button>
  </div>
</section>

<section class="modelx">
  <h2>Model X</h2>
  <p>Luxury Electric SUV</p>
  <div class="buttons">
    <button class="btn btn-dark">Buy</button>
    <button class="btn btn-light">Explore</button>
  </div>
</section>

<footer>
  <p>© 2026 Tesla Clone | Made by You</p>
</footer>

</body>
</html>
